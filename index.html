<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مسبار — التقارير</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --emerald: #10b981;
      --emerald-dim: rgba(16,185,129,0.15);
      --emerald-glow: rgba(16,185,129,0.4);
      --bg: #060d0f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(16,185,129,0.2);
      --text: #e2e8f0;
      --muted: #9ca3af;
      --ar: 'Noto Naskh Arabic', serif;
      --mono: 'Space Mono', monospace;
    }
 
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--ar);
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      direction: rtl;
    }
 
    .cosmic-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(16,185,129,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(16,185,129,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #060d0f 40%, #0a1a14 100%);
      transition: transform 0.1s linear, opacity 0.1s linear;
      transform-origin: center center;
    }
    .cosmic-bg::after {
      content: ''; position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 5%,  rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 33% 88%, rgba(16,185,129,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 67% 12%, rgba(16,185,129,0.5) 0%, transparent 100%);
    }
 
    .navigation {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      transition: background 0.3s, backdrop-filter 0.3s, border-color 0.3s;
      border-bottom: 1px solid transparent;
    }
    .navigation.scrolled {
      background: rgba(6,13,15,0.85);
      backdrop-filter: blur(16px);
      border-color: var(--border);
    }
    .progress-bar {
      position: absolute; top: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, var(--emerald), #34d399);
      width: 0%; transition: width 0.1s linear;
      box-shadow: 0 0 8px var(--emerald);
    }
    .nav-container {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 2rem;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 1.3rem; font-weight: 700;
      color: var(--text); text-decoration: none;
      font-family: var(--ar);
    }
    .nav-links { list-style: none; display: flex; gap: 2rem; }
    .nav-links a {
      font-family: var(--ar);
      color: var(--muted); text-decoration: none; font-size: 0.95rem;
      font-weight: 500; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--emerald); }
 
    .hero-section {
      position: relative; z-index: 1;
      min-height: 55vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 120px 2rem 60px;
    }
    .hero-content { max-width: 760px; }
    .hero-title {
      font-family: var(--ar);
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 700; line-height: 1.3; margin-bottom: 1.2rem;
    }
    .emerald-text { color: var(--emerald); }
    .hero-subtitle {
      font-family: var(--ar);
      font-size: 1.15rem; color: var(--muted); line-height: 1.95;
      margin-bottom: 2.5rem;
    }
 
    .search-wrapper { display: flex; justify-content: center; margin-bottom: 0.5rem; }
    .search-box { position: relative; width: 100%; max-width: 520px; }
    .search-box input {
      width: 100%; padding: 14px 48px 14px 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-family: var(--ar); font-size: 0.95rem; outline: none;
      direction: rtl; text-align: right;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .search-box input::placeholder { color: #6b7280; }
    .search-box input:focus { border-color: var(--emerald); box-shadow: 0 0 0 3px var(--emerald-dim); }
    .search-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
 
    .filters {
      display: flex; justify-content: center; flex-wrap: wrap;
      gap: 0.6rem; padding: 0 2rem 2rem; position: relative; z-index: 1;
    }
    .filter-btn {
      padding: 7px 20px; border-radius: 20px; font-size: 0.9rem;
      font-weight: 500; cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-family: var(--ar); transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--emerald-dim); border-color: var(--emerald); color: var(--emerald);
    }
 
    .reports-section { position: relative; z-index: 1; padding: 0 2rem 80px; }
    .section-label {
      text-align: center; color: var(--emerald);
      font-family: var(--mono);
      font-size: 0.78rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 0.6rem;
    }
    .section-title { text-align: center; font-family: var(--ar); font-size: clamp(1.7rem, 3vw, 2.5rem); font-weight: 700; margin-bottom: 0.8rem; line-height: 1.4; }
    .section-subtitle {
      text-align: center; color: var(--muted); font-family: var(--ar);
      font-size: 1.05rem; line-height: 1.95; max-width: 600px; margin: 0 auto 3rem;
    }
 
    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.8rem; max-width: 1200px; margin: 0 auto;
    }
 
    .report-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px; overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      position: relative;
    }
    .report-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; z-index: 2;
      background: linear-gradient(90deg, transparent, var(--emerald-glow), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .report-card:hover {
      transform: translateY(-6px);
      border-color: var(--border);
      box-shadow: 0 20px 60px rgba(16,185,129,0.12);
    }
    .report-card:hover::before { opacity: 1; }
 
    .card-cover {
      width: 100%;
      aspect-ratio: 1 / 1.414;
      background: #080f0d;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid rgba(16,185,129,0.15);
      flex-shrink: 0;
    }
    .card-cover canvas {
      position: absolute; top: 0; left: 0;
      width: 100% !important; height: 100% !important;
      object-fit: contain; display: block;
      opacity: 0; transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .card-cover canvas.loaded { opacity: 1; }
    .report-card:hover .card-cover canvas { transform: scale(1.02); }
 
    .cover-skeleton {
      position: absolute; inset: 0;
      background: linear-gradient(
        115deg,
        rgba(16,185,129,0.03) 25%,
        rgba(16,185,129,0.09) 50%,
        rgba(16,185,129,0.03) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 2s infinite linear;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      transition: opacity 0.4s;
    }
    .cover-skeleton.hidden { opacity: 0; pointer-events: none; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skeleton-icon { opacity: 0.18; }
    .skeleton-label {
      font-family: var(--ar);
      font-size: 0.78rem; font-weight: 600;
      color: rgba(16,185,129,0.45);
    }
 
    .cover-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
      background: linear-gradient(to top, rgba(6,13,15,0.92) 0%, transparent 100%);
      padding: 1.4rem 1.1rem 0.75rem;
      display: flex; align-items: center; justify-content: space-between;
      direction: ltr;
    }
    .cover-month-badge {
      font-family: var(--mono);
      font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--emerald);
      background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3);
      padding: 3px 11px; border-radius: 20px;
    }
    .cover-size-label { font-family: var(--mono); font-size: 0.7rem; color: #6b7280; }
 
    .card-body { padding: 1.35rem 1.5rem 1.6rem; display: flex; flex-direction: column; flex: 1; }
    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
    .card-tag {
      font-family: var(--mono);
      font-size: 0.7rem; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--emerald);
      background: var(--emerald-dim); border: 1px solid rgba(16,185,129,0.25);
      padding: 3px 11px; border-radius: 20px;
    }
    .card-title {
      font-family: var(--ar);
      font-size: 1.1rem; font-weight: 700; margin-bottom: 0.6rem;
      line-height: 1.55; color: #f1f5f9;
    }
    .card-desc {
      font-family: var(--ar);
      font-size: 0.92rem; color: var(--muted);
      line-height: 1.95; flex: 1; margin-bottom: 1.25rem;
    }
 
    .card-actions { display: flex; gap: 0.65rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 18px; border-radius: 9px;
      font-family: var(--ar);
      font-size: 0.9rem; font-weight: 600;
      text-decoration: none; cursor: pointer; border: none; transition: all 0.22s;
    }
    .btn-primary { background: var(--emerald); color: #030f0a; flex: 1; }
    .btn-primary:hover { background: #34d399; box-shadow: 0 0 24px rgba(16,185,129,0.5); }
    .btn-secondary {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted); padding: 10px 13px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.11); color: var(--text); }
 
    .empty-state { text-align: center; padding: 5rem 2rem; color: var(--muted); display: none; font-family: var(--ar); }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.4; }
    .empty-state p { font-size: 1.05rem; }
 
    .scroll-reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
    .scroll-reveal.visible { opacity: 1; transform: translateY(0); }
 
    footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 2rem; }
    .footer-content {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-logo {
      display: flex; align-items: center; gap: 0.6rem;
      font-family: var(--ar);
      font-weight: 700; font-size: 1.1rem;
    }
    .footer-links { list-style: none; display: flex; gap: 1.5rem; align-items: center; }
    .footer-links a {
      color: var(--muted); text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--emerald); }
    .footer-copy { font-family: var(--ar); color: #6b7280; font-size: 0.85rem; }
 
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .reports-grid { grid-template-columns: 1fr; }
      .footer-content { flex-direction: column; text-align: center; }
    }
  </style>
</head>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
 
    const reports = [
      {
        title: "التقرير الشهري — أبريل 2026",
        desc: "شهر اتّسعت فيه دائرة هجمات الفدية لتطال 772 ضحيةً عبر 70 مجموعة نشطة. نتوقّف عند توجيه CISA الطارئ ED 26-03 الذي استهدف ثغرات Cisco SD-WAN، ونرصد كيف أصبحت سلسلة الإمداد بوّابة الاختراق الأبرز، من Vimeo إلى ADT وVercel وAmtrak.",
        tag: "2026",
        date: "Apr 2026",
        size: "1.52 MB",
        file: "Monthly-Threat-Report-April.pdf"
      },
      {
        title: "التقرير الشهري — مارس 2026",
        desc: "قراءة تحليلية لأبرز ما جرى في الفضاء السيبراني خلال مارس، من تصاعد نشاط عصابات الفدية، إلى الثغرات المُستغَلة فعلياً (KEV)، والموردين الذين تصدّروا قوائم الضحايا هذا الشهر.",
        tag: "2026",
        date: "Mar 2026",
        size: "2.03 MB",
        file: "Monthly-Threat-Report-March.pdf"
      },
      {
        title: "التقرير الشهري — فبراير 2026",
        desc: "680 ضحيةً جديدة، و54 مجموعة فدية نشطة، وثغرة BeyondTrust الحرجة CVE-2026-1731 التي استُغِلّت خلال أربعة أيام فقط من الإفصاح. نفكّك المشهد بأكمله، من عودة استهداف القطاع الصحي إلى أبرز الاختراقات التي طالت Wynn Resorts وBridgePay وANSI.",
        tag: "2026",
        date: "Feb 2026",
        size: "1.21 MB",
        file: "Monthly-Threat-Report-February.pdf"
      },
      {
        title: "التقرير الشهري — يناير 2026",
        desc: "بداية العام السيبراني كما رأيناها: ثغرات نشطة دخلت حيّز الاستغلال، حملات خصوم تتجدّد، وحوادث جوهرية رسمت خط الأساس لما تبعها من شهور. نقدّم خلاصة هذه الفترة في صورة مكثّفة.",
        tag: "2026",
        date: "Jan 2026",
        size: "3.67 MB",
        file: "Monthly-Threat-Report-January.pdf"
      }
    ];
 
    let activeFilter = 'all';
 
    function renderReports(data) {
      const grid = document.getElementById('reportsGrid');
      const empty = document.getElementById('emptyState');
      grid.innerHTML = '';
 
      if (!data.length) {
        empty.style.display = 'block';
        return;
      }
 
      empty.style.display = 'none';
 
      data.forEach((r, i) => {
        const globalIdx = reports.indexOf(r);
        const card = document.createElement('div');
        card.className = 'report-card scroll-reveal';
        card.style.transitionDelay = (i % 3) * 90 + 'ms';
        card.dataset.index = globalIdx;
        card.dataset.file = r.file;
 
        card.innerHTML = `
          <div class="card-cover" id="cover-${globalIdx}">
            <div class="cover-skeleton" id="skeleton-${globalIdx}">
              <svg class="skeleton-icon" width="48" height="48" fill="none"
                   stroke="#10b981" stroke-width="1" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5
                     A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0
                     00-3.375-3.375H8.25M9 12h6M9 15h3m3 6H5.625
                     A1.125 1.125 0 014.5 19.875V5.625A1.125 1.125
                     0 015.625 4.5H13.5a4.5 4.5 0 013.182 1.318l2.25
                     2.25A4.5 4.5 0 0120.25 11v8.625a1.125 1.125
                     0 01-1.125 1.125H18"/>
              </svg>
              <span class="skeleton-label">جارٍ تحميل الغلاف…</span>
            </div>
            <canvas id="canvas-${globalIdx}"></canvas>
            <div class="cover-overlay">
              <span class="cover-month-badge">${r.date}</span>
              <span class="cover-size-label">${r.size}</span>
            </div>
          </div>
 
          <div class="card-body">
            <div class="card-top">
              <span class="card-tag">${r.tag}</span>
            </div>
            <h3 class="card-title">${r.title}</h3>
            <p class="card-desc">${r.desc}</p>
            <div class="card-actions">
              <a class="btn btn-primary" href="${r.file}" target="_blank" rel="noopener noreferrer">
                <svg width="14" height="14" fill="none" stroke="currentColor"
                     stroke-width="2.5" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                فتح التقرير
              </a>
              <a class="btn btn-secondary" href="${r.file}" download title="تحميل PDF">
                <svg width="15" height="15" fill="none" stroke="currentColor"
                     stroke-width="2.5" viewBox="0 0 24 24">
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
              </a>
            </div>
          </div>
        `;
 
        grid.appendChild(card);
        scrollObserver.observe(card);
        coverObserver.observe(card);
      });
    }
 
    function filterReports() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      let filtered = reports;
 
      if (activeFilter !== 'all') {
        filtered = filtered.filter(r => r.tag === activeFilter);
      }
 
      if (q) {
        filtered = filtered.filter(r =>
          r.title.toLowerCase().includes(q) ||
          r.desc.toLowerCase().includes(q)
        );
      }
 
      renderReports(filtered);
    }
 
    function setFilter(tag, btn) {
      activeFilter = tag;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterReports();
    }
 
    const scrollObserver = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) e.target.classList.add('visible');
      });
    }, { threshold: 0.07, rootMargin: '0px 0px -50px 0px' });
 
    document.querySelectorAll('.scroll-reveal').forEach(el => scrollObserver.observe(el));
 
    const coverObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
 
        const card = entry.target;
        const idx = card.dataset.index;
        const file = card.dataset.file;
 
        coverObserver.unobserve(card);
        renderPDFCover(idx, file);
      });
    }, { threshold: 0.05, rootMargin: '120px 0px 120px 0px' });
 
    function renderPDFCover(idx, pdfPath) {
      const skeleton = document.getElementById('skeleton-' + idx);
      const canvas = document.getElementById('canvas-' + idx);
      const cover = document.getElementById('cover-' + idx);
 
      if (!canvas || !cover) return;
 
      pdfjsLib.getDocument(pdfPath).promise
        .then(pdf => pdf.getPage(1))
        .then(page => {
          const containerW = cover.offsetWidth || 320;
          const baseVP = page.getViewport({ scale: 1 });
          const scale = containerW / baseVP.width;
          const viewport = page.getViewport({ scale });
 
          canvas.width = viewport.width;
          canvas.height = viewport.height;
 
          const ctx = canvas.getContext('2d');
          return page.render({ canvasContext: ctx, viewport }).promise;
        })
        .then(() => {
          if (skeleton) skeleton.classList.add('hidden');
          canvas.classList.add('loaded');
        })
        .catch(() => {
          if (skeleton) {
            skeleton.innerHTML =
              '<span class="skeleton-label" style="color:rgba(239,68,68,0.55)">المعاينة غير متاحة</span>';
          }
        });
    }
 
    const nav = document.getElementById('navigation');
    const pb = document.getElementById('progressBar');
    const bg = document.getElementById('cosmicBg');
 
    window.addEventListener('scroll', () => {
      const st = window.pageYOffset;
      const sh = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      pb.style.width = (st / sh * 100) + '%';
      nav.classList.toggle('scrolled', st > 50);
      bg.style.transform = `scale(${1 + st / 3000})`;
      bg.style.opacity = Math.max(1 - st / 3000, 0.3);
    }, { passive: true });
 
    renderReports(reports);
  </script>
</body>
</html>
